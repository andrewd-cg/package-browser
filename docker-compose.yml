services:
  init-data:
    image: cgr.dev/chainguard/wolfi-base:latest
    pull_policy: always
    user: root
    command: ["sh", "-c", "chown 65532:65532 /data && cp -rp /host-chainctl/. /chainctl-cache/ && chown -R 65532:65532 /chainctl-cache/"]
    volumes:
      - ./data:/data
      - ~/.cache/chainguard:/host-chainctl:ro
      - chainctl-cache:/chainctl-cache

  package-browser:
    image: ghcr.io/andrewd-cg/package-browser:latest
    pull_policy: always
    depends_on:
      init-data:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      MALWARE_DB_PATH: /data/malware.db
    volumes:
      - ./data:/data
      - chainctl-cache:/home/nonroot/.cache/chainguard

volumes:
  chainctl-cache:
